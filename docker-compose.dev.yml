services:

  backend:
    build:
      context: ./Backend
     

    container_name: post-backend-dev

    ports: dockerfile: Dockerfile.dev
      - "3000:3000"

    env_file:
      - ./Backend/.env

    volumes:
      - ./Backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.dev

    container_name: post-frontend-dev

    ports:
      - "5173:5173"

    volumes:
      - ./Frontend:/app
      - /app/node_modules

    depends_on:
      - backend